<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>juego del tikitok</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Outfit', sans-serif;
            color: white;
        }

        canvas {
            display: block;
            background: #000;
            margin: 0 auto;
        }

        #score {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 28px;
            font-weight: 800;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .modal {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.3s;
        }

        .modal.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 30px;
            width: 80%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        h2 {
            margin-top: 0;
            color: #ff85a2;
            font-weight: 800;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 14px;
            margin-bottom: 5px;
            color: #ddd;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: none;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-family: inherit;
            box-sizing: border-box;
        }

        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .btn {
            background: linear-gradient(135deg, #ff4d79, #ff85a2);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            font-family: inherit;
            transition: transform 0.2s;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .leaderboard-list {
            list-style: none;
            padding: 0;
            margin: 0 0 20px 0;
            max-height: 200px;
            overflow-y: auto;
        }

        .leaderboard-list li {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 18px;
        }

        .leaderboard-list li:last-child {
            border-bottom: none;
        }

        .leaderboard-list .rank-1 {
            color: #ffd700;
            font-weight: bold;
        }

        .leaderboard-list .rank-2 {
            color: #c0c0c0;
        }

        .leaderboard-list .rank-3 {
            color: #cd7f32;
        }

        .top-btns {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            background: rgba(0, 0, 0, 0.5);
            border: none;
            color: white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 20px;
            cursor: pointer;
            backdrop-filter: blur(4px);
        }
    </style>
</head>

<body>
    <div id="score">0</div>

    <div class="top-btns">
        <button class="icon-btn" onclick="openSettings()">⚙️</button>
        <button class="icon-btn" onclick="openLeaderboard()">🏆</button>
    </div>

    <canvas id="gameCanvas"></canvas>
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <h2>Configuración</h2>

            <div class="input-group">
                <label>Tu Nombre</label>
                <input type="text" id="playerNameInput" placeholder="Ej. Diego">
            </div>

            <button class="btn" onclick="saveSettings()">Guardar y Jugar</button>
        </div>
    </div>

    <div id="leaderboardModal" class="modal hidden">
        <div class="modal-content">
            <h2>🏆 Mejores Puntos</h2>
            <ul class="leaderboard-list" id="leaderboardList">
                <li>Cargando...</li>
            </ul>
            <button class="btn" onclick="closeLeaderboard()">Cerrar</button>
        </div>
    </div>

    <script type="module" src="game.js"></script>
</body>

</html>
